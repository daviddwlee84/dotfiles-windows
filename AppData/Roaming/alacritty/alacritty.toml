# Alacritty - Windows config. Read from %APPDATA%\alacritty\alacritty.toml.
# Shares styling + CSI-u keybindings with the macOS/Linux dotfiles; the
# macOS-only bits (option_as_alt, window blur) are dropped and the shell is pwsh.

[terminal.shell]
program = "pwsh"
args = ["-NoLogo"]

[font]
normal = { family = "Hack Nerd Font Mono", style = "Regular" }
bold = { family = "Hack Nerd Font Mono", style = "Bold" }
italic = { family = "Hack Nerd Font Mono", style = "Italic" }
bold_italic = { family = "Hack Nerd Font Mono", style = "Bold Italic" }
size = 12.0

[env]
TERM = "xterm-256color"

[window]
padding.x = 10
padding.y = 10
opacity = 0.9

# CSI-u keybindings (portable). The ESC (\u001b) prefix is load-bearing so tmux
# and Neovim receive the sequence.
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001b[13;2u"

[[keyboard.bindings]]
key = "Slash"
mods = "Control"
chars = "\u001f"

[[keyboard.bindings]]
key = "Return"
mods = "Control"
chars = "\u001b[13;5u"

[[keyboard.bindings]]
key = "Key1"
mods = "Control"
chars = "\u001b[49;5u"

[[keyboard.bindings]]
key = "Key2"
mods = "Control"
chars = "\u001b[50;5u"

[[keyboard.bindings]]
key = "Key3"
mods = "Control"
chars = "\u001b[51;5u"

[[keyboard.bindings]]
key = "Key4"
mods = "Control"
chars = "\u001b[52;5u"

[[keyboard.bindings]]
key = "Key5"
mods = "Control"
chars = "\u001b[53;5u"

[[keyboard.bindings]]
key = "Key6"
mods = "Control"
chars = "\u001b[54;5u"

[[keyboard.bindings]]
key = "Key7"
mods = "Control"
chars = "\u001b[55;5u"

[[keyboard.bindings]]
key = "Key8"
mods = "Control"
chars = "\u001b[56;5u"

[[keyboard.bindings]]
key = "Key9"
mods = "Control"
chars = "\u001b[57;5u"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
chars = "\u001b[48;5u"

[[keyboard.bindings]]
key = "T"
mods = "Control|Shift"
action = "SpawnNewInstance"

[[keyboard.bindings]]
key = "N"
mods = "Control|Shift"
action = "SpawnNewInstance"

