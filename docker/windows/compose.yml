# Windows 11 VM in a container for testing bootstrap.ps1.
# REQUIRES an x86-64 Linux host with KVM (/dev/kvm). Does NOT work on Apple
# Silicon / macOS. See README.md.
services:
  windows:
    image: dockurr/windows
    container_name: windows-dotfiles-test
    environment:
      VERSION: "11"
      USERNAME: "dev"
      PASSWORD: "dev"
      RAM_SIZE: "8G"
      CPU_CORES: "4"
      DISK_SIZE: "64G"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - "8006:8006"      # web viewer (http://localhost:8006)
      - "3389:3389/tcp"  # RDP
      - "3389:3389/udp"
    volumes:
      - ./storage:/storage        # VM disk (git-ignored)
      - ../../:/data               # this repo -> \\host.lan\Data inside Windows
    restart: on-failure
    stop_grace_period: 2m
